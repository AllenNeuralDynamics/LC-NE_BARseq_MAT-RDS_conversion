# Conda environment for the BARseq MAT-to-RDS conversion. Lists the R
# packages used by the capsule's scripts; transitive deps resolve
# automatically.
name: r4-base
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base=4.2.3
  - openssl=3.6.2
  - r-hdf5r=1.3.10
  - r-matrix=1.6_5
  - bioconductor-singlecellexperiment=1.20.0
  - bioconductor-summarizedexperiment=1.28.0
